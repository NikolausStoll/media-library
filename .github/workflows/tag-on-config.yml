name: Tag on Config Version

on:
  push:
    branches:
      - main
    paths:
      - media-library/config.yaml

jobs:
  bump-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version change
        id: version
        run: |
          python - <<'PY'
          import subprocess
          import sys
          import yaml

          def load_version(ref):
            try:
              output = subprocess.run(
                ["git", "show", f"{ref}:media-library/config.yaml"],
                capture_output=True,
                text=True,
                check=True,
              )
            except subprocess.CalledProcessError:
              return ""
            data = yaml.safe_load(output.stdout)
            return data.get("version", "")

          new_version = load_version("HEAD")
          old_version = load_version("HEAD^")

          print(f"New version: {new_version}")
          print(f"Old version: {old_version}")
          if not new_version:
            print("::set-output name=changed::false")
            sys.exit(0)

          changed = "true" if new_version != old_version else "false"
          print(f"::set-output name=changed::{changed}")
          if changed == "true":
            print(f"::set-output name=version::{new_version}")
          PY

      - name: Create tag from config version
        id: create_tag
        if: steps.version.outputs.changed == 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG="$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Trigger Docker Release workflow
        if: steps.version.outputs.changed == 'true'
        env:
          DISPATCH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [[ -z "$DISPATCH_TOKEN" ]]; then
            echo "GH_PAT secret is required to dispatch workflows. Create a PAT with repo+workflow scopes and save it as GH_PAT." >&2
            exit 1
          fi
          TAG=${{ steps.create_tag.outputs.tag }}
          curl -X POST \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "User-Agent: GitHub Actions" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/docker-release.yml/dispatches \
            -d "{\"ref\":\"$TAG\"}"
