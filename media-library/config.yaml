name: "Media Library"
slug: "media-library"
description: "Media Library (games, movies, series)"
version: "1.17.0"
url: "https://github.com/NikolausStoll/media-library"

arch:
  - amd64
  - aarch64
  - armv7

startup: application
init: false

ingress: true
ingress_port: 8099

ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Media Library Web UI (direct)"

image: "ghcr.io/nikolausstoll/media-library"

options:
  port: 8099
  db_path: "/data/backend.db"
  static_dir: "/app/public"
  TMDB_API_KEY: ""
  AI_API_KEY: ""
  AI_MODEL: "gpt-4o-mini"
  BOOK_PREP_WEB_SEARCH_MODEL: "gpt-4o-mini"
  IMAGE_QUALITY: 80
  IMAGE_MAX_DIMENSION: 1200
  IMAGE_QUALITY_THUMB: 80
  IMAGE_MAX_DIMENSION_THUMB: 600
schema:
  port: int(1024,65535)
  db_path: str
  static_dir: str
  TMDB_API_KEY: password
  AI_API_KEY: password
  AI_MODEL: str
  BOOK_PREP_WEB_SEARCH_MODEL: str
  IMAGE_QUALITY: int(1,100)
  IMAGE_MAX_DIMENSION: int(100,8000)
  IMAGE_QUALITY_THUMB: int(1,100)
  IMAGE_MAX_DIMENSION_THUMB: int(100,4000)
